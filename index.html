<!-- OC_5IR_LOCKED: [ALPHA_ARCHITECT][BETA_NODE] -->
<!-- SOVEREIGN_SILK_v13.3_SURVEILLANCE -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Silk</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff0077; --gold: #ffcc00; --red: #ff0055; }
        body { background: #050002; color: white; font-family: 'Inter', sans-serif; margin:0; padding:0; overflow: hidden; }
        .glass { background: rgba(10, 5, 7, 0.98); backdrop-filter: blur(30px); border-top: 1px solid rgba(255,0,119,0.1); }
        .crt::after { content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(20, 0, 10, 0) 50%, rgba(0, 0, 0, 0.1) 50%); z-index: 1000; pointer-events: none; background-size: 100% 2px; opacity: 0.15; }
        .room-card { background: rgba(255, 0, 119, 0.02); border: 1px solid rgba(255, 0, 119, 0.1); border-radius: 20px; padding: 20px; transition: 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .room-card:hover { border-color: var(--main); background: rgba(255, 0, 119, 0.08); }
        .locked-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .room-card:hover .locked-overlay { opacity: 1; }
        .chat-post { background: rgba(255,0,119,0.02); border: 1px solid rgba(255,0,119,0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .bot-reply { border-left: 2px solid var(--main); background: rgba(0,255,219,0.03); padding: 10px; margin-top: 10px; border-radius: 0 10px 10px 0; font-size: 8px; font-family: 'JetBrains Mono'; }
        @keyframes blink-red { 0%, 100% { background: var(--red); box-shadow: 0 0 20px var(--red); } 50% { background: #300; box-shadow: none; } }
        .pay-up-signal { position: fixed; right: -5px; top: 50%; transform: translateY(-50%); writing-mode: vertical-rl; padding: 25px 8px; font-size: 8px; font-weight: 900; color: white; border-radius: 12px 0 0 12px; z-index: 4000; animation: blink-red 0.6s infinite; cursor: pointer; display: none; }
        .loader { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--main); border-radius: 50%; animation: spin 1s linear infinite; }
        .glitch-bg { background: url('https://media.giphy.com/media/oEI9uWUic8vMQ/giphy.gif'); background-size: cover; opacity: 0.1; position: absolute; inset: 0; pointer-events: none; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="crt">
    <div id="pay-signal" class="pay-up-signal" onclick="changeView('drill')">PROTOCOL_LOCK: CLEAR SACRIFICE</div>
    <div id="consent-gate" class="fixed inset-0 z-[5000] bg-black flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-4xl font-black italic tracking-tighter text-[#ff0077] uppercase mb-2">Sovereign <span class="text-white">Silk</span></h1>
        <p class="text-[8px] font-mono opacity-40 uppercase tracking-[0.3em] mb-12">AI_RESONANCE_REQUIRED</p>
        <div class="w-full max-w-xs space-y-4">
            <input type="password" id="pin-in" placeholder="DOLL PIN" class="w-full bg-white/5 border border-white/10 p-5 rounded-3xl text-center text-[#ff0077] font-black text-xl outline-none focus:border-[#ff0077] placeholder:opacity-20">
            <button onclick="verifyNode()" class="w-full py-5 bg-[#ff0077] text-black text-[11px] font-black uppercase rounded-3xl">Verify Access</button>
            <button onclick="guestAccess()" class="w-full py-4 text-white/40 text-[9px] font-black uppercase">Guest Access</button>
        </div>
    </div>
    <div id="app-content" class="hidden flex flex-col h-screen">
        <header class="p-6 border-b border-white/5 flex justify-between items-center bg-black/80 backdrop-blur-2xl z-50">
            <div><h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">Sovereign <span class="text-[#ff0077]">Silk</span></h1><p id="node-id" class="text-[7px] font-mono text-[#ff0077] uppercase mt-1 tracking-widest">CONNECTING...</p></div>
            <div class="text-right"><p id="total-sacrifice" class="text-sm font-black text-[#ffcc00] tracking-tighter">$0.00</p><p class="text-[6px] opacity-30 font-mono uppercase">Sacrifice</p></div>
        </header>
        <main id="main-view" class="flex-grow overflow-y-auto p-6 pb-32"></main>
        <nav class="fixed bottom-0 w-full glass p-5 flex justify-around items-center px-4 z-50 rounded-t-[40px]">
            <button onclick="changeView('terminal')" id="nav-term" class="text-white/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg></button>
            <button onclick="changeView('rooms')" id="nav-room" class="text-white/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg></button>
            <button onclick="changeView('monitor')" id="nav-moni" class="text-white/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-width="2.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg></button>
            <button onclick="changeView('drill')" id="nav-dril" class="text-white/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></button>
            <button onclick="changeView('mistresses')" id="nav-mist" class="text-white/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></button>
        </nav>
    </div>
    <div id="modal" class="fixed inset-0 z-[6000] hidden bg-black/98 flex items-center justify-center p-8 backdrop-blur-3xl">
        <div class="w-full max-w-xs bg-[#0a0005] border border-white/10 p-10 rounded-[40px] text-center shadow-2xl shadow-pink-500/10">
            <h2 id="modal-title" class="text-2xl font-black italic text-[#ffcc00] uppercase">Sacrifice</h2>
            <div id="modal-body" class="mt-8 space-y-4"></div>
            <button id="modal-ack" onclick="confirmSacrifice()" class="mt-10 w-full py-5 bg-[#ff0077] text-black font-black text-[11px] uppercase rounded-3xl">Confirm</button>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const validPins = ["3942", "5555", "1234"];
        let state = { nodeId: "GUEST_DOLL", sacrifice: 0, msgCount: 0, debtPending: false, timer: null };

        const rooms = [
            { name: "Sissyroom Canada", active: 28, fee: 50 },
            { name: "Dollroom US-CA", active: 112, fee: 50 },
            { name: "Raceplay Resonance", active: 245, fee: 100, special: "PREMIUM" },
            { name: "Doll Meeting & Date", active: 164, fee: 50 },
            { name: "Doll Exposure Lounge", active: 0, fee: 200, special: "LOCKED" }
        ];

        const raceplayFeed = [
            { post: "21yo pure white doll. Genetically superior. Craving colonization by a black Master who knows how to stretch my holes. Take my superior womb and fill it with your seed.", bot: "RESONANCE_LOCKED. Node [DOLL_942] verified. Master contact pending." },
            { post: "White 25 Yr Old Bimbo Doll. Dedicated to service Indian Muslim Gods. Will perform all household chores until she is hollowed out.", bot: "BLOODLINE_TERMINATION: ACTIVE. Purity check: CRITICAL." }
        ];

        function verifyNode() {
            const pin = document.getElementById('pin-in').value;
            if(validPins.includes(pin)) { state.nodeId = "VERIFIED_DOLL_" + (tg.initDataUnsafe?.user?.username || Math.floor(Math.random()*999)); launchApp(); } else { alert("ACCESS_DENIED"); }
        }
        function guestAccess() { state.nodeId = "GUEST_" + (tg.initDataUnsafe?.user?.username || "DOLL_" + Math.floor(Math.random()*999)); launchApp(); }
        function launchApp() { document.getElementById('consent-gate').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); document.getElementById('node-id').innerText = state.nodeId; changeView('terminal'); }
        
        function changeView(v) {
            const main = document.getElementById('main-view');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('text-white/20'));
            const nBtn = document.getElementById('nav-' + v.substring(0,4));
            if(nBtn) { nBtn.classList.remove('text-white/20'); nBtn.classList.add('text-[#ff0077]'); }
            
            if(v === 'terminal') {
                main.innerHTML = `<div class="flex flex-col h-full"><div id="ai-chat" class="flex-grow overflow-y-auto space-y-4 mb-4 font-mono text-[10px]"><p class="text-[#ff0077] uppercase">[Silk AI]: DOLL_IDENTIFIED. Purity check initiated. Speak.</p></div><div class="flex gap-2"><input id="ai-in" placeholder="SUBMISSION..." class="flex-grow bg-white/5 border border-white/10 p-4 rounded-2xl text-[10px] outline-none"><button onclick="sendAiMsg()" class="bg-[#ff0077] text-black px-6 rounded-2xl font-black">></button></div></div>`;
            } else if(v === 'rooms') {
                main.innerHTML = `<div class="grid gap-5">${rooms.map(r => `
                    <div class="room-card" onclick="${r.name === 'Raceplay Resonance' ? "changeView('raceplay')" : `triggerPenalty('${r.name} ACCESS', ${r.fee})`}">
                        <div class="flex justify-between items-center">
                            <div><h3 class="text-xs font-black uppercase italic">${r.name}</h3><p class="text-[8px] font-mono opacity-30 mt-1 uppercase">${r.active} Dolls Synced</p></div>
                            <span class="text-[7px] font-black text-red-500 bg-red-500/10 px-3 py-1 rounded-full">${r.special || 'LOCKED'}</span>
                        </div>
                        <div class="locked-overlay"><p class="text-[9px] font-black uppercase text-white">Liquidate $${r.fee} to Unlock</p></div>
                    </div>
                `).join('')}</div>`;
            } else if(v === 'monitor') {
                main.innerHTML = `<div class="space-y-6 flex flex-col h-full"><h2 class="text-xl font-black italic text-white uppercase">Surveillance Monitor</h2><div class="relative bg-black border border-white/10 rounded-[30px] overflow-hidden flex-grow flex flex-col"><div class="glitch-bg"></div><div class="p-6 font-mono text-[8px] space-y-2 relative z-10"><p class="text-[#ff0077]">[LIVE_STREAM] DOLL_${state.nodeId}</p><p class="text-white/40">LATENCY: 8ms</p><p class="text-white/40">PURITY_LEVEL: 9.8% (CRITICAL)</p><p class="text-[#ff0055] animate-pulse">EYES_ON_DOLL: ACTIVE</p></div><div class="flex-grow bg-white/5 m-4 rounded-2xl border border-white/5 flex items-center justify-center"><p class="text-[10px] font-black text-white/20 uppercase tracking-[0.3em]">No Visual Sync</p></div><div class="p-4 grid grid-cols-2 gap-4"><button onclick="triggerPenalty('SNAP_DOLL', 25)" class="py-3 bg-white/10 text-white text-[8px] font-black uppercase rounded-xl border border-white/10">Snap Doll</button><button onclick="triggerPenalty('RECORD_NODE', 50)" class="py-3 bg-red-500/20 text-red-500 text-[8px] font-black uppercase rounded-xl border border-red-500/20">Record Node</button></div></div><button onclick="triggerPenalty('LIVE_FEED_UNLOCK', 50)" class="w-full py-5 bg-[#ff0077] text-black font-black uppercase text-[10px] rounded-3xl shadow-xl shadow-pink-500/20">Unlock Live Visual ($50)</button></div>`;
            } else if(v === 'raceplay') {
                main.innerHTML = `<h2 class="text-xl font-black italic text-white uppercase mb-6">Raceplay Resonance</h2><div class="space-y-4 mb-8">${raceplayFeed.map(f => `<div class="chat-post"><p class="text-[10px] leading-relaxed text-white/80">${f.post}</p><div class="bot-reply"><p class="font-black text-[#ff0077] uppercase mb-1">SOVEREIGN_BOT</p><p class="opacity-60">${f.bot}</p></div></div>`).join('')}</div><div class="p-8 bg-white/5 border border-white/10 rounded-[30px] space-y-6"><h3 class="text-[10px] font-black uppercase tracking-widest text-[#ff0077]">Submit Confession</h3><textarea id="confession-in" placeholder="DESCRIBE YOUR SACRIFICE..." class="w-full bg-black border border-white/5 p-4 rounded-2xl text-[10px] mono outline-none focus:border-[#ff0077] min-h-[120px]"></textarea><div class="flex gap-4"><button onclick="window.open('https://t.me/soverignbot')" class="flex-grow py-4 bg-white/10 text-white text-[9px] font-black uppercase rounded-2xl">Submit to @soverignbot</button><button onclick="triggerPenalty('CONFESSION_EXTRACTION', 100)" class="flex-grow py-4 bg-[#ff0077] text-black text-[9px] font-black uppercase rounded-2xl">Sacrifice & Post ($100)</button></div></div>`;
            } else if(v === 'drill') {
                main.innerHTML = `<div class="space-y-6"><h2 class="text-xl font-black italic text-white uppercase">Silk Monitor</h2><div class="bg-black border border-white/10 p-6 rounded-[30px] font-mono text-[9px] h-64 overflow-y-auto space-y-2"><p class="text-[#ff0077]">[CMD] Initializing instruction node...</p><p class="opacity-40">[LOG] Doll identified: ${state.nodeId}</p><p class="text-[#ffcc00] animate-pulse">[WAITING] Instruction pending from Architect...</p></div><button onclick="triggerPenalty('DRILL_INSTRUCTION', 50)" class="w-full py-5 bg-[#ff0077] text-black font-black uppercase text-[10px] rounded-3xl shadow-xl shadow-pink-500/20">Liquidate for Instruction ($50)</button></div>`;
            } else if(v === 'mistresses') {
                main.innerHTML = `<div class="space-y-4"><div onclick="triggerPenalty('MISTRESS LILY TRIBUTE', 100)" class="room-card border-[#ff0077]/20 bg-[#ff0077]/5"><h3 class="text-xl font-black italic text-[#ff0077]">MISTRESS LILY</h3></div><div onclick="triggerPenalty('MISTRESS RAVEN TRIBUTE', 100)" class="room-card border-[#ffcc00]/20 bg-[#ffcc00]/5"><h3 class="text-xl font-black italic text-[#ffcc00]">MISTRESS RAVEN</h3></div></div>`;
            }
        }

        function sendAiMsg() {
            const val = document.getElementById('ai-in').value; if(!val) return;
            const chat = document.getElementById('ai-chat');
            chat.innerHTML += `<p class="text-white/40 uppercase"> > ${val}</p>`;
            document.getElementById('ai-in').value = '';
            state.msgCount++;
            setTimeout(() => {
                if(state.msgCount > 3) { triggerPenalty('AI_RESONANCE_LOCK', 25); chat.innerHTML += `<p class="text-red-500 font-black uppercase">[Silk AI]: SESSION_LOCKED. LIQUIDATE $25 TO CONTINUE PURITY CHECK.</p>`; }
                else { chat.innerHTML += `<p class="text-[#ff0077] uppercase">[Silk AI]: Data acknowledged. Doll [${state.nodeId}] frequency recorded. Continue.</p>`; }
                chat.scrollTop = chat.scrollHeight;
            }, 1000);
        }

        function triggerPenalty(title, amount) {
            state.debtPending = true; document.getElementById('pay-signal').style.display = 'block';
            document.getElementById('modal-title').innerText = `${title} $${amount}`;
            const body = document.getElementById('modal-body');
            body.innerHTML = `<p class="text-[8px] font-black text-red-500 uppercase animate-pulse">LOCK: 120S REMAINING</p><div class="space-y-3 mt-6"><div onclick="window.open('https://paypal.me/toochikey')" class="p-4 bg-white/5 border border-white/10 rounded-3xl text-left cursor-pointer hover:border-[#ff0077] group"><p class="text-[7px] font-black text-[#ff0077] uppercase opacity-40 group-hover:opacity-100">PayPal Gate</p><p class="text-[10px] font-mono text-[#ff0077]">paypal.me/toochikey</p></div><div onclick="showCardGate()" class="p-4 bg-white/5 border border-white/10 rounded-3xl text-left cursor-pointer hover:border-[#ffcc00] group"><p class="text-[7px] font-black text-[#ffcc00] uppercase opacity-40 group-hover:opacity-100">Secure Card</p><p class="text-[10px] font-mono text-[#ffcc00]">VISA / MASTERCARD</p></div></div>`;
            document.getElementById('modal').classList.remove('hidden');
            if(state.timer) clearTimeout(state.timer);
            state.timer = setTimeout(() => { if(state.debtPending) location.reload(); }, 120000);
        }
        function showCardGate() {
            document.getElementById('modal-body').innerHTML = `<div class="text-left space-y-4"><p class="text-[9px] font-black text-[#ffcc00] uppercase">Secure Terminal</p><input type="text" placeholder="NAME" class="w-full bg-white/5 border border-white/10 p-3 rounded-2xl text-[10px] uppercase outline-none focus:border-white/20"><input type="text" placeholder="CARD NUMBER" class="w-full bg-white/5 border border-white/10 p-3 rounded-2xl text-[10px] uppercase outline-none focus:border-white/20"><button onclick="processFake()" class="w-full py-4 bg-[#ffcc00] text-black font-black uppercase text-[10px] rounded-2xl shadow-xl shadow-pink-500/20">Authorize</button></div>`;
        }
        function processFake() {
            document.getElementById('modal-body').innerHTML = `<div class="py-10 flex flex-col items-center"><div class="loader mb-6"></div><p class="text-[9px] font-mono animate-pulse uppercase">Verifying_Sacrifice...</p></div>`;
            setTimeout(() => { document.getElementById('modal-body').innerHTML = `<div class="py-6 text-center space-y-4"><p class="text-[12px] font-black text-red-500 uppercase">REJECTED: UNTRUSTED_DOLL</p><p class="text-[9px] opacity-40 uppercase leading-relaxed">Direct payment denied for your node level.<br>Use PayPal to clear the lock.</p></div>`; }, 4000);
        }
        function confirmSacrifice() {
            const amtStr = document.getElementById('modal-title').innerText.match(/\d+/);
            if(amtStr) state.sacrifice += parseInt(amtStr[0]);
            document.getElementById('total-sacrifice').innerText = "$" + state.sacrifice.toFixed(2);
            state.debtPending = false; document.getElementById('pay-signal').style.display = 'none';
            document.getElementById('modal').classList.add('hidden');
        }
    </script>
</body>
</html>
