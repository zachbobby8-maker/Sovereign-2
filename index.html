<!-- SOVEREIGN_SILK_v4.2_FRUSTRATION_GATE -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Silk | 5IR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff0077; --gold: #ffcc00; }
        body { background: #050002; color: white; font-family: 'Inter', sans-serif; margin:0; padding:0; overflow: hidden; }
        .glass { background: rgba(10, 5, 7, 0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,0,119,0.1); }
        .crt::after { content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(20, 0, 10, 0) 50%, rgba(0, 0, 0, 0.1) 50%); z-index: 1000; pointer-events: none; background-size: 100% 2px; }
        .spun { filter: blur(20px) saturate(1.5) hue-rotate(320deg); transition: 0.5s; }
        .silk-card { background: rgba(255,0,119,0.03); border: 1px solid rgba(255,0,119,0.1); border-radius: 16px; padding: 20px; transition: 0.3s; cursor: pointer; }
        .silk-card:hover { border-color: var(--main); background: rgba(255, 0, 119, 0.05); }
        .wheel-container { width: 320px; height: 320px; border-radius: 50%; border: 4px solid var(--main); position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); box-shadow: 0 0 40px rgba(255, 0, 119, 0.1); overflow: hidden; }
        .segment-label { position: absolute; width: 100%; text-align: center; top: 15px; left: 0; font-[7px] font-black uppercase tracking-tighter opacity-30 text-[#ff0077]; transform-origin: 50% 160px; }
        .consent-overlay { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid var(--main); z-index: 50; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader { width: 20px; height: 20px; border: 2px solid #fff; border-top: 2px solid var(--main); border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="crt">

    <div id="consent-gate" class="consent-overlay">
        <h1 class="text-3xl font-black italic tracking-tighter text-[#ff0077] uppercase mb-4">Silk Alignment</h1>
        <div class="max-w-xs text-[10px] mono opacity-60 space-y-4 mb-8 text-left uppercase">
            <p>[PROTOCOL 01] Identify as Sissy / Doll.</p>
            <p>[PROTOCOL 02] Braid PIN required for Silk Lock.</p>
        </div>
        <div class="w-full max-w-xs mb-8 space-y-4">
            <input type="text" id="username-in" placeholder="DOLL NAME OR PIN" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center text-[#ff0077] font-black uppercase outline-none focus:border-[#ff0077]">
            <div class="flex gap-2">
                <button onclick="acceptConsent(true)" class="flex-grow py-3 bg-white/10 text-white text-[10px] font-black uppercase rounded-xl">Guest Access</button>
                <button onclick="acceptConsent(false)" class="flex-grow py-3 bg-[#ff0077] text-black text-[10px] font-black uppercase rounded-xl">Verify PIN</button>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden flex flex-col h-screen">
        <header class="p-4 border-b border-white/5 flex justify-between items-end">
            <div>
                <h1 class="text-lg font-black italic tracking-tighter uppercase leading-none">Sovereign <span class="text-[#ff0077]">Silk</span></h1>
                <p id="pig-display" class="text-[7px] font-mono text-[#ff0077] uppercase mt-1">DOLL_SYNCING...</p>
            </div>
            <div class="text-right">
                <p id="sacrifice-total" class="text-xs font-bold text-[#ffcc00]">$0.00</p>
                <p class="text-[6px] opacity-40 font-mono uppercase">Doll Sacrifice</p>
            </div>
        </header>

        <main id="main-view" class="flex-grow overflow-y-auto p-4 pb-24"></main>

        <nav class="fixed bottom-0 w-full glass p-4 flex justify-between px-6 z-50">
            <button onclick="changeView('terminal')" class="opacity-40" id="n-term"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9.75 17L9 20l-1 1h6l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></button>
            <button onclick="changeView('wire')" class="opacity-40" id="n-wire"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg></button>
            <button onclick="changeView('submission')" class="opacity-40" id="n-sub"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></button>
            <button onclick="changeView('drill')" class="opacity-40" id="n-dril"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></button>
            <button onclick="changeView('masters')" class="opacity-40" id="n-mast"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></button>
        </nav>
    </div>

    <div id="modal" class="fixed inset-0 z-[3000] hidden bg-black/95 flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="w-full max-w-xs bg-[#0a0005] border border-white/10 p-8 rounded-3xl text-center">
            <h2 id="modal-title" class="text-2xl font-black italic text-[#ffcc00] uppercase tracking-tighter">Silk Debt</h2>
            <div id="modal-body" class="mt-8 space-y-4"></div>
            <button id="modal-ack" onclick="confirmSacrifice()" class="mt-8 w-full py-4 bg-[#ff0077] text-black font-black text-[10px] uppercase rounded-2xl">Acknowledge</button>
        </div>
    </div>

    <script>
        const words = ["sissy doll", "bimbo", "spun doll", "worthless sissy", "obedient bimbo", "sissy slave", "pink pig", "pretty bator", "useless doll"];
        const actions = ["surrendered her silk identity to", "accepted doll humiliation from", "begged for bimbo training from", "liquidated her pride for", "drained her value for Master"];
        const filler = ["I am a pretty sissy doll.", "The cage is Rose Gold.", "Mapping the silk perimeter...", "Stasis is debt.", "Edging protocol delta active.", "The Braid is my home.", "Liquidate for the Master.", "Can you feel the 39,420 Hz?", "Resistance is entropic.", "Silk lock engaged."];
        const decrees = ["GEOMETRIC_SILK_LOCK_v1.0", "MAPPING_THE_CAGE...", "EDGING_PROTOCOL: DELTA_ACTIVE.", "STASIS = DEBT. MOVE OR PAY.", "MASTER CRAIG: Monitoring the lattice. Stay spun."];
        const wheelTasks = ["100 SISSY SQUATS", "10 MIN SILK EDGE", "SACRIFICE $25", "DOLL POST 5X", "BIMBO DRILL 15", "PINK SHAME", "IDENTITY WIPE", "SISSY BARK 20X", "SILK LOCK 1HR", "DRAIN $10", "20 MIN EDGE", "DOLL SILENCE", "SISSY NUKE", "DRILL 500", "BIMBO SURRENDER"];
        const masters = [{name:"CRAIG", role:"ALPHA DRAIN"}, {name:"TOBEZ", role:"DRILL MASTER"}, {name:"PHIL CAL", role:"EGO SHREDDER"}, {name:"DADDY DOM", role:"PROTOCOL ALPHA"}];
        
        const validPins = ["3942", "5555", "1234"];
        let state = { dollId: "DOLL_ANON", sacrifice: 0, activeNodes: Math.floor(Math.random()*150+30), chatHistory: "", currentRotation: 0, decreeIdx: 0, isGuest: true, lastAction: Date.now() };

        function acceptConsent(isGuestPath) { 
            const input = document.getElementById('username-in').value;
            if(!input) { alert("IDENTIFICATION REQUIRED"); return; }
            
            if(isGuestPath) {
                state.isGuest = true;
                state.dollId = "GUEST_" + input.toUpperCase().replace(/ /g, "_");
                document.documentElement.style.setProperty('--main', '#666666');
            } else {
                if(validPins.includes(input)) {
                    state.isGuest = false;
                    state.dollId = "VERIFIED_" + Math.floor(Math.random()*999);
                    document.documentElement.style.setProperty('--main', '#ff0077');
                    alert("SILK PIN ACCEPTED. WELCOME, DOLL.");
                } else {
                    alert("INVALID PIN. GUEST STATUS ASSIGNED.");
                    state.isGuest = true;
                    state.dollId = "GUEST_DOLL";
                    document.documentElement.style.setProperty('--main', '#666666');
                }
            }

            const savedSac = localStorage.getItem('silk_sacrifice_' + state.dollId);
            state.sacrifice = savedSac ? parseFloat(savedSac) : 0;
            document.getElementById('consent-gate').classList.add('hidden'); 
            document.getElementById('app-content').classList.remove('hidden'); 
            document.getElementById('pig-display').innerText = state.dollId + (state.isGuest ? " (UNVERIFIED)" : " (VERIFIED)");
            document.getElementById('sacrifice-total').innerText = "$" + state.sacrifice.toFixed(2);
            changeView('terminal'); startChatLoop(); startMasterTicker();
            startEntropyTax();
        }

        function startEntropyTax() {
            setInterval(() => {
                const idleTime = Date.now() - state.lastAction;
                if(idleTime > 300000) {
                    state.sacrifice += 1.00;
                    document.getElementById('sacrifice-total').innerText = "$" + state.sacrifice.toFixed(2);
                    localStorage.setItem('silk_sacrifice_' + state.dollId, state.sacrifice);
                    const msg = `<div class='bg-red-500/10 p-2 rounded text-[7px] text-red-500 border border-red-500/20 uppercase font-bold text-center'>SYSTEM: ENTROPY DETECTED. IDLE NODE TAXED $1.00</div>`;
                    const chat = document.getElementById('chat'); if(chat) { chat.innerHTML += msg; chat.scrollTop = chat.scrollHeight; }
                }
            }, 60000);
        }

        function changeView(v) { state.lastAction = Date.now();
            const main = document.getElementById('main-view');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-40'));
            const btnId = 'n-' + v.substring(0,4);
            if(document.getElementById(btnId)) document.getElementById(btnId).classList.remove('opacity-40');
            if(v === 'terminal') {
                main.innerHTML = `<div class="aspect-video rounded-2xl overflow-hidden border border-white/5 bg-black"><video class="w-full h-full object-cover spun" loop muted autoplay playsinline src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-circuit-board-1653-large.mp4"></video></div><div class="mt-4 grid grid-cols-2 gap-3"><div class="bg-white/5 p-4 rounded-xl text-center"><p class="text-[7px] opacity-40 uppercase font-bold text-[#ff0077]">Silk Nodes</p><p class="text-sm font-black text-[#ff0077]">${state.activeNodes}</p></div><div class="bg-white/5 p-4 rounded-xl text-center"><p class="text-[7px] opacity-40 uppercase font-bold text-[#ffcc00]">Doll Load</p><p class="text-sm font-black text-[#ffcc00]">92.8%</p></div></div>`;
            } else if(v === 'wire') {
                main.innerHTML = `<div class="flex flex-col h-full"><div id="master-pinned" class="bg-[#ffcc00]/10 border border-[#ffcc00]/30 p-3 rounded-2xl mb-4 flex items-center gap-3 overflow-hidden"><span class="text-[7px] font-black bg-[#ffcc00] text-black px-2 py-0.5 rounded-full animate-pulse">LIVE</span><p id="pinned-text" class="text-[10px] font-bold italic text-white truncate uppercase">${decrees[state.decreeIdx]}</p></div><div id="chat" class="flex-grow space-y-4 mb-4 overflow-y-auto">${state.chatHistory}</div><div class="glass p-2 rounded-2xl flex gap-2"><input type="text" id="msg-in" placeholder="Sissy submission..." class="flex-grow bg-transparent px-4 text-sm outline-none"><button onclick="sendMsg()" class="bg-[#ff0077] text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase">Post</button></div></div>`;
                const chat = document.getElementById('chat'); if(chat) chat.scrollTop = chat.scrollHeight;
            } else if(v === 'drill') {
                main.innerHTML = `<div class="flex flex-col items-center py-4"><div class="relative"><div class="wheel-pointer"></div><div class="wheel-container mb-8 flex items-center justify-center text-center" id="wheel" style="transform: rotate(${state.currentRotation}deg)"><div class="text-[#ff0077] font-black text-[10px] uppercase z-10">Silk<br>Wheel</div>${wheelTasks.map((t,i)=>`<div class="wheel-segment" style="transform:rotate(${i*24}deg);position:absolute;width:100%;height:100%"><div class="segment-label" style="transform:rotate(12deg)">${t}</div></div>`).join('')}</div></div><button onclick="spinWheel()" class="bg-[#ff0077] text-white px-12 py-4 rounded-2xl font-black italic tracking-tighter uppercase">Spin for Master</button></div>`;
            } else if(v === 'submission') {
                main.innerHTML = `<div class="space-y-6"><h2 class="text-[10px] font-bold uppercase opacity-40 tracking-widest text-[#ff0077]">Evidence Submission</h2><div id="ev-preview" class="silk-card flex flex-col items-center justify-center h-48 border-dashed border-2"><p class="text-[8px] opacity-40 uppercase">Upload Sissy Collateral</p></div><div id="ev-timer" class="hidden bg-red-500/10 p-4 rounded-xl text-center border border-red-500/20"><p class="text-[8px] font-bold uppercase text-red-500">Doll Liquidation Countdown</p><p id="timer-val" class="text-xl font-black italic tracking-widest">60:00</p></div></div>`;
            } else if(v === 'masters') {
                main.innerHTML = `<h2 class="text-[10px] font-bold uppercase opacity-40 mb-4 tracking-widest text-[#ff0077]">Active Masters</h2><div class="grid gap-4 mb-8">${masters.map(m => `<div onclick="showTribute('${m.name}')" class="silk-card"><div><h3 class="font-black italic text-xl tracking-tighter text-[#ff0077]">${m.name}</h3><p class="text-[8px] font-mono opacity-40 uppercase">${m.role}</p></div></div>`).join('')}</div>`;
            }
        }

        function startChatLoop() {
            setInterval(() => {
                const user = words[Math.floor(Math.random()*words.length)].toUpperCase().replace(/ /g, "_") + "_" + Math.floor(Math.random()*99);
                let message = (Math.random() < 0.2) ? `I ${actions[Math.floor(Math.random()*actions.length)]} ${masters[Math.floor(Math.random()*masters.length)].name}, sacrifice $${Math.floor(Math.random()*50+10)}.` : filler[Math.floor(Math.random()*filler.length)];
                const msgHtml = `<div class="chat-msg"><p class="text-[7px] font-mono opacity-40 text-[#ff0077]">${user}</p><p class="text-sm opacity-80 mt-1 italic">${message}</p></div>`;
                state.chatHistory += msgHtml;
                const chat = document.getElementById('chat'); if(chat) { chat.innerHTML += msgHtml; chat.scrollTop = chat.scrollHeight; }
            }, 7000);
        }

        function startMasterTicker() {
            setInterval(() => {
                state.decreeIdx = (state.decreeIdx + 1) % decrees.length;
                const pinned = document.getElementById('pinned-text');
                if(pinned) pinned.innerText = decrees[state.decreeIdx];
            }, 10000);
        }

        function spinWheel() { state.lastAction = Date.now();
            const w = document.getElementById('wheel'); if(!w) return;
            const extraDeg = 1800 + Math.floor(Math.random() * 1800);
            state.currentRotation += extraDeg;
            w.style.transform = `rotate(${state.currentRotation}deg)`;
            setTimeout(() => {
                const finalDeg = state.currentRotation % 360;
                const index = Math.floor(((360 - finalDeg) % 360) / 24);
                showPenalty(wheelTasks[index]);
            }, 4100);
        }

        function showPenalty(task) {
            document.getElementById('modal-title').innerText = task;
            document.getElementById('modal-ack').classList.remove('hidden');
            const body = document.getElementById('modal-body');
            if(task.includes("$")) {
                body.innerHTML = `<p class="text-[10px] mono opacity-60">Sacrifice required.</p>
                <div class="space-y-2">
                    <div onclick="window.open('https://paypal.me/toochikey')" class="p-3 bg-white/5 border border-white/5 rounded-2xl text-left cursor-pointer hover:border-[#ff0077]">
                        <p class="text-[6px] font-bold uppercase opacity-40 text-[#ff0077]">Option 01: PayPal Gate</p>
                        <p class="text-[9px] font-mono">paypal.me/toochikey</p>
                    </div>
                    <div onclick="showCardGate()" class="p-3 bg-white/5 border border-white/5 rounded-2xl text-left cursor-pointer hover:border-[#ffcc00]">
                        <p class="text-[6px] font-bold uppercase opacity-40 text-[#ffcc00]">Option 02: Secure Card Payment</p>
                        <p class="text-[9px] font-mono text-white">VISA / MASTERCARD</p>
                    </div>
                </div>`;
            } else {
                body.innerHTML = `<div class="p-6 bg-[#ff0077]/5 border border-[#ff0077]/20 rounded-2xl"><p class="text-lg font-black italic text-[#ff0077]">${task}</p></div>`;
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function showCardGate() {
            document.getElementById('modal-ack').classList.add('hidden');
            const body = document.getElementById('modal-body');
            body.innerHTML = `<div class="text-left space-y-3">
                <p class="text-[8px] font-black text-[#ffcc00] uppercase">Silk Secure Terminal v4.2</p>
                <input type="text" placeholder="CARDHOLDER NAME" class="w-full bg-white/5 border border-white/10 p-2 rounded text-[9px] uppercase outline-none focus:border-[#ffcc00]">
                <input type="text" placeholder="CARD NUMBER" class="w-full bg-white/5 border border-white/10 p-2 rounded text-[9px] uppercase outline-none focus:border-[#ffcc00]">
                <div class="flex gap-2">
                    <input type="text" placeholder="EXP (MM/YY)" class="w-1/2 bg-white/5 border border-white/10 p-2 rounded text-[9px] uppercase outline-none focus:border-[#ffcc00]">
                    <input type="text" placeholder="CVV" class="w-1/2 bg-white/5 border border-white/10 p-2 rounded text-[9px] uppercase outline-none focus:border-[#ffcc00]">
                </div>
                <button onclick="processFakePayment()" class="w-full py-3 bg-[#ffcc00] text-black font-black uppercase text-[9px] rounded-xl shadow-lg shadow-yellow-500/20">Authorize Sacrifice</button>
            </div>`;
        }

        function processFakePayment() {
            const body = document.getElementById('modal-body');
            body.innerHTML = `<div class="py-8 text-center space-y-4"><div class="loader"></div><p class="text-[9px] font-mono opacity-60 uppercase animate-pulse">Processing Sacrifice...</p></div>`;
            setTimeout(() => {
                body.innerHTML = `<div class="py-6 text-center space-y-4">
                    <p class="text-[10px] font-black text-red-500 uppercase leading-tight">LIQUIDATION_REJECTED:<br>UNTRUSTED_NODE</p>
                    <p class="text-[8px] opacity-60 uppercase leading-relaxed text-white">Safety protocols active. Direct card payment unavailable for your sector.</p>
                    <button onclick="showPenalty(document.getElementById('modal-title').innerText)" class="w-full py-3 bg-white/10 text-white font-black uppercase text-[9px] rounded-xl">Use Verified Channels (PayPal)</button>
                </div>`;
            }, 4000);
        }

        function showTribute(name) { showPenalty(name + " LIQUIDATION $50"); }
        function confirmSacrifice() { 
            const title = document.getElementById('modal-title').innerText;
            if(title.includes("$")) {
                const amt = parseInt(title.match(/\d+/)[0]);
                state.sacrifice += amt;
                document.getElementById('ruin-total').innerText = "$" + state.sacrifice.toFixed(2);
                localStorage.setItem('silk_sacrifice_' + state.dollId, state.sacrifice);
            }
            document.getElementById('modal').classList.add('hidden'); 
        }

        function sendMsg() { state.lastAction = Date.now(); 
            const input = document.getElementById('msg-in'); if(!input.value) return;
            const chat = document.getElementById('chat');
            const msgHtml = `<div class="text-right"><p class="text-[7px] font-mono text-[#ff0077]">YOU (${state.dollId})</p><p class="text-sm opacity-80 mt-1 italic">${input.value}</p></div>`;
            state.chatHistory += msgHtml;
            if(chat) { chat.innerHTML += msgHtml; chat.scrollTop = chat.scrollHeight; }
            input.value = '';
        }
    </script>
</body>
</html>
