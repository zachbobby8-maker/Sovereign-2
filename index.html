<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff00ff; --gold: #ffcc00; }
        body { background: #020202; color: white; font-family: 'Inter', sans-serif; margin:0; padding:0; overflow: hidden; }
        .glass { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.05); }
        .crt::after { content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); z-index: 1000; pointer-events: none; background-size: 100% 2px; }

        .master-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; transition: 0.3s; cursor: pointer; }
        .master-card:hover { border-color: var(--main); background: rgba(255, 0, 255, 0.05); }
        .wheel-container { width: 320px; height: 320px; border-radius: 50%; border: 4px solid var(--main); position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); box-shadow: 0 0 40px rgba(255, 0, 255, 0.1); overflow: hidden; }
        .wheel-segment { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }

        .consent-overlay { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .evidence-box { border: 2px dashed rgba(255, 0, 255, 0.2); border-radius: 20px; height: 200px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid var(--main); z-index: 50; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="crt">

    <div id="consent-gate" class="consent-overlay">
        <h1 class="text-3xl font-black italic tracking-tighter text-[#ff00ff] uppercase mb-4 text-main">Sissy Alignment</h1>

        </div>
        <button onclick="acceptConsent()" class="w-full max-w-xs py-4 bg-[#ff00ff] text-black font-black uppercase rounded-2xl">Surrender to Sissy Status</button>

    <div id="app-content" class="hidden flex flex-col h-screen">
        <header class="p-4 border-b border-white/5 flex justify-between items-end">

                <h1 class="text-lg font-black italic tracking-tighter uppercase leading-none text-main">Sovereign <span class="text-[#ff00ff]">Sissy</span></h1>

            <div class="text-right">

            </div>
        </header>

        <main id="main-view" class="flex-grow overflow-y-auto p-4 pb-24"></main>

        <nav class="fixed bottom-0 w-full glass p-4 flex justify-between px-6 z-50">
            <button onclick="changeView('terminal')" class="opacity-40 text-main" id="n-term"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></button>
            <button onclick="changeView('wire')" class="opacity-40" id="n-wire"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg></button>
            <button onclick="changeView('submission')" class="opacity-40" id="n-sub"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></button>
            <button onclick="changeView('drill')" class="opacity-40" id="n-dril"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></button>
            <button onclick="changeView('mistresses')" class="opacity-40" id="n-mast"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></button>
        </nav>
    </div>

    <div id="modal" class="fixed inset-0 z-[3000] hidden bg-black/95 flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="w-full max-w-xs bg-[#0a0a0a] border border-white/10 p-8 rounded-3xl text-center">
            <h2 id="modal-title" class="text-2xl font-black italic text-[#ff00ff] uppercase tracking-tighter">Penalty</h2>
            <div id="modal-body" class="mt-8 space-y-4"></div>
            <button onclick="confirmSacrifice()" class="mt-8 w-full py-4 bg-[#ff00ff] text-black font-black text-[10px] uppercase rounded-2xl">Confirm Sacrifice</button>
        </div>
    </div>

    <script>
        const words = ["sissy slut", "spun sissy", "mindless doll", "useless pet", "needy girl", "cumdump", "skank", "slutpuppy", "idiot", "waste", "property", "sissy"];
        const actions = ["accepted total sacrifice for", "begged for sissy alignment from", "surrendered my assets to", "liquidated my identity for", "accepted shameful sissy status from", "surrendered to the protocol for"];
        const filler = ["Forced to clean floors today.", "Mindless spun sissy for Mistress Lily.", "My old life was a waste.", "Skank for the Queen Bee.", "Pulse erases my thoughts.", "Hope the Matriarch binds me.", "Being a spun slut is simple.", "Everything is beautiful when you are empty.", "Just another mindless sissy asset.", "Exposed on Whisper wire. I deserve it."];
        const decrees = ["Currently aligning sissy Sarah. Mindless property.", "MISTRESS RAVEN: Sacrifice or be liquidated.", "SUCCUBUS LILY: Draining savings from the sissy bank.", "MATRIARCH: Total containment initiated.", "QUEEN BEE: The Hive demands your spark."];
        const wheelTasks = ["SISSY SURRENDER", "10 MIN EDGE", "SACRIFICE $25", "100 REP SQUAT", "BARK FOR SISSY", "ASSET NUKE", "COLLATERAL PUSH", "SILK BINDING", "SISSY CONTAINMENT", "DRAIN $10", "20 MIN EDGE", "TOTAL VOID", "EGO SHRED", "SILENCE PROTOCOL", "DRILL 1000", "MISTRESS CHOICE"];
        const mistresses = [{name:"GOTH RAVEN", role:"SILK MOTHER"}, {name:"SUCCUBUS LILY", role:"ASSET DRAIN"}, {name:"MATRIARCH", role:"HIVE ALPHA"}, {name:"QUEEN BEE", role:"PROTOCOL QUEEN"}];
        
        let state = { dollId: "SISSY_ANONYMOUS", sacrifice: 0, activeKittens: Math.floor(Math.random()*150+30), chatHistory: "", currentRotation: 0, decreeIdx: 0 };

        function acceptConsent() { 
            const userIn = document.getElementById('username-in').value;
            if(!userIn) { alert("IDENTIFICATION REQUIRED"); return; }
            state.dollId = userIn.toUpperCase().replace(/ /g, "_");
            const savedSac = localStorage.getItem('silk_sacrifice_' + state.dollId);
            state.sacrifice = savedSac ? parseFloat(savedSac) : 0;
            document.getElementById('consent-gate').classList.add('hidden'); 
            document.getElementById('app-content').classList.remove('hidden'); 
            document.getElementById('doll-display').innerText = state.dollId;
            document.getElementById('sacrifice-total').innerText = "$" + state.sacrifice.toFixed(2);
            changeView('terminal'); startChatLoop(); startMistressTicker();
        }

        function changeView(v) {
            const main = document.getElementById('main-view');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-40'));
            const btnId = 'n-' + v.substring(0,4);
            if(document.getElementById(btnId)) document.getElementById(btnId).classList.remove('opacity-40');
            if(v === 'terminal') {
                main.innerHTML = `<div class="aspect-video rounded-2xl overflow-hidden border border-white/5 bg-black"><video class="w-full h-full object-cover spun" loop muted autoplay playsinline src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-circuit-board-1653-large.mp4"></video></div><div class="mt-4 grid grid-cols-2 gap-3"><div class="bg-white/5 p-4 rounded-xl text-main text-center"><p class="text-[7px] opacity-40 uppercase font-bold">Synchronized Sissies</p><p class="text-sm font-black">${state.activeKittens}</p></div><div class="bg-white/5 p-4 rounded-xl text-main text-center"><p class="text-[7px] opacity-40 uppercase font-bold">Sissy Load</p><p class="text-sm font-black text-[#ffcc00]">98.4%</p></div></div>`;
            } else if(v === 'wire') {
                main.innerHTML = `<div class="flex flex-col h-full"><div id="mistress-pinned" class="bg-[#ffcc00]/10 border border-[#ffcc00]/30 p-3 rounded-2xl mb-4 flex items-center gap-3 overflow-hidden"><span class="text-[7px] font-black bg-[#ffcc00] text-black px-2 py-0.5 rounded-full animate-pulse">LIVE</span><p id="pinned-text" class="text-[10px] font-bold italic text-white truncate uppercase">${decrees[state.decreeIdx]}</p></div><div id="chat" class="flex-grow space-y-4 mb-4 overflow-y-auto">${state.chatHistory}</div><div class="glass p-2 rounded-2xl flex gap-2"><input type="text" id="msg-in" placeholder="Whisper mindless things..." class="flex-grow bg-transparent px-4 text-sm outline-none"><button onclick="sendMsg()" class="bg-[#ff00ff] text-black px-6 py-2 rounded-xl text-[10px] font-black uppercase">Send</button></div></div>`;
                const chat = document.getElementById('chat'); if(chat) chat.scrollTop = chat.scrollHeight;
            } else if(v === 'drill') {
                main.innerHTML = `<div class="flex flex-col items-center py-4"><div class="relative"><div class="wheel-pointer"></div><div class="wheel-container mb-8 flex items-center justify-center text-center" id="wheel" style="transform: rotate(${state.currentRotation}deg)"><div class="text-main font-black text-[10px] uppercase z-10">Sissy<br>Wheel</div>${wheelTasks.map((t,i)=>`<div class="wheel-segment" style="transform:rotate(${i*22.5}deg)"><div class="segment-line"></div><div class="segment-label" style="transform:rotate(11.25deg)">${t}</div></div>`).join('')}</div></div><button onclick="spinWheel()" class="bg-[#ff00ff] text-white px-12 py-4 rounded-2xl font-black italic tracking-tighter uppercase shadow-xl shadow-[#ff00ff]/20">Spin for Mistress</button></div>`;
            } else if(v === 'submission') {
                main.innerHTML = `<div class="space-y-6"><h2 class="text-[10px] font-bold uppercase opacity-40 tracking-widest text-main">Evidence Submission</h2><div id="ev-preview" class="evidence-box cursor-pointer" onclick="document.getElementById('file-in').click()"><p class="text-[8px] opacity-40 uppercase">Upload Sissy Collateral</p></div><input type="file" id="file-in" class="hidden" onchange="uploadEvidence(event)"><div id="ev-timer" class="hidden bg-[#ffcc00]/10 p-4 rounded-xl text-center border border-[#ffcc00]/20"><p class="text-[8px] font-bold uppercase text-[#ffcc00]">Sissy Liquidation Countdown</p><p id="timer-val" class="text-xl font-black italic tracking-widest">60:00</p></div></div>`;
                checkEvidence();
            } else if(v === 'mistresses') {
                main.innerHTML = `<h2 class="text-[10px] font-bold uppercase opacity-40 mb-4 tracking-widest text-main">Active Mistresses</h2><div class="grid gap-4 mb-8">${mistresses.map(m => `<div onclick="showSacrificeResult('${m.name}')" class="master-card"><div><h3 class="font-black italic text-xl tracking-tighter text-main">${m.name}</h3><p class="text-[8px] font-mono opacity-40 uppercase">${m.role}</p></div></div>`).join('')}</div><h2 class="text-[10px] font-bold uppercase opacity-40 mb-4 tracking-widest text-main text-right">Live Sissy Sacrifices</h2><div id="ruin-ticker" class="space-y-2"></div>`;
                startSacrificeTicker();
            }
        }

        function startChatLoop() {
            setInterval(() => {
                const user = words[Math.floor(Math.random()*words.length)].toUpperCase().replace(/ /g, "_") + "_" + Math.floor(Math.random()*999);
                let message = (Math.random() < 0.15) ? `I ${actions[Math.floor(Math.random()*actions.length)]} ${mistresses[Math.floor(Math.random()*mistresses.length)].name}, paid $${Math.floor(Math.random()*90+10)} for my sissy alignment.` : filler[Math.floor(Math.random()*filler.length)];
                const msgHtml = `<div class="chat-msg"><p class="text-[7px] font-mono opacity-40 text-main">${user}</p><p class="text-sm opacity-80 mt-1 italic italic">${message}</p></div>`;
                state.chatHistory += msgHtml;
                const chat = document.getElementById('chat'); if(chat) { chat.innerHTML += msgHtml; chat.scrollTop = chat.scrollHeight; }
            }, 6000);
        }

        function startMistressTicker() {
            setInterval(() => {
                state.decreeIdx = (state.decreeIdx + 1) % decrees.length;
                const pinned = document.getElementById('pinned-text');
                if(pinned) pinned.innerText = decrees[state.decreeIdx];
            }, 10000);
        }

        function startSacrificeTicker() {
            const t = document.getElementById('ruin-ticker'); if(!t) return;
            setInterval(() => {
                const amount = (Math.random()*100+5).toFixed(2);
                const div = document.createElement('div');
                div.className = "bg-white/5 p-3 rounded-xl border-l-2 border-[#ff00ff] flex justify-between";
                div.innerHTML = `<span class="text-[8px] mono opacity-40 text-main">SISSY_EXTRACTED</span><span class="text-[8px] font-black text-[#ffcc00]">$${amount}</span>`;
                t.prepend(div); if(t.children.length > 5) t.lastChild.remove();
            }, 4000);
        }

        function spinWheel() {
            const w = document.getElementById('wheel'); if(!w) return;
            const extraDeg = 1800 + Math.floor(Math.random() * 1800);
            state.currentRotation += extraDeg;
            w.style.transform = `rotate(${state.currentRotation}deg)`;
            setTimeout(() => {
                const finalDeg = state.currentRotation % 360;
                const index = Math.floor(((360 - finalDeg) % 360) / 22.5);
                const task = wheelTasks[index];
                showPenalty(task);
            }, 4100);
        }

        function showPenalty(task) {
            document.getElementById('modal-title').innerText = task;
            const body = document.getElementById('modal-body');
            if(task.includes("$")) {
                body.innerHTML = `<p class="text-[10px] mono opacity-60">Sissy sacrifice required.</p><div onclick="window.open('https://paypal.me/toochikey')" class="p-4 bg-white/5 border border-white/5 rounded-2xl text-left cursor-pointer hover:border-[#ff00ff]"><p class="text-[7px] font-bold uppercase opacity-40 text-[#ff00ff]">PayPal Sacrifice</p><p class="text-[10px] font-mono">paypal.me/toochikey</p></div>`;
            } else {
                body.innerHTML = `<p class="text-[10px] mono opacity-60">Sissy alignment task assigned.</p><div class="p-6 bg-[#ff00ff]/5 border border-[#ff00ff]/20 rounded-2xl"><p class="text-lg font-black italic text-main">${task}</p></div>`;
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function showSacrificeResult(name) { showPenalty(name + " SACRIFICE $50"); }
        function confirmSacrifice() { 
            const title = document.getElementById('modal-title').innerText;
            if(title.includes("$")) {
                const amt = parseInt(title.match(/\d+/)[0]);
                state.sacrifice += amt;
                document.getElementById('sacrifice-total').innerText = "$" + state.sacrifice.toFixed(2);
                localStorage.setItem('silk_sacrifice_' + state.dollId, state.sacrifice);
            }
            document.getElementById('modal').classList.add('hidden'); 
        }

        function uploadEvidence(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (f) => { localStorage.setItem('silk_evidence', f.target.result); localStorage.setItem('silk_evidence_expiry', Date.now() + 3600000); checkEvidence(); };
            reader.readAsDataURL(file);
        }

        function checkEvidence() {
            const data = localStorage.getItem('silk_evidence'), expiry = localStorage.getItem('silk_evidence_expiry'), preview = document.getElementById('ev-preview'), timerBox = document.getElementById('ev-timer');
            if(data && expiry > Date.now()) {
                if(preview) preview.innerHTML = `<img src="${data}" class="w-full h-full object-cover rounded-2xl">`;
                if(timerBox) timerBox.classList.remove('hidden');
                startTimer(expiry);
            }
        }

        function startTimer(expiry) {
            if(window.timerInt) clearInterval(window.timerInt);
            window.timerInt = setInterval(() => {
                const rem = expiry - Date.now();
                if(rem <= 0) { localStorage.removeItem('silk_evidence'); location.reload(); return; }
                const mins = Math.floor(rem/60000), secs = Math.floor((rem%60000)/1000);
                const d = document.getElementById('timer-val'); if(d) d.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }, 1000);
        }

        function sendMsg() { 
            const input = document.getElementById('msg-in'); if(!input.value) return;
            const chat = document.getElementById('chat');
            const msgHtml = `<div class="text-right"><p class="text-[7px] font-mono text-main">YOU (${state.dollId})</p><p class="text-sm opacity-80 mt-1 italic">${input.value}</p></div>`;
            state.chatHistory += msgHtml;
            if(chat) { chat.innerHTML += msgHtml; chat.scrollTop = chat.scrollHeight; }
            input.value = '';
        }
    </script>
