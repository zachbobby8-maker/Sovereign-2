<!-- SOVEREIGN_SILK_v2.1_AI_UPGRADE -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN SILK | 5IR HIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff00ff; --gold: #ffcc00; }
        body { background: #020202; color: white; font-family: 'Inter', sans-serif; margin:0; padding:0; overflow: hidden; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); }
        .crt::after { content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); z-index: 100; pointer-events: none; background-size: 100% 2px; }
        .spun { filter: blur(20px) saturate(2); transition: 0.5s; }
        .master-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; transition: 0.3s; cursor: pointer; }
        .master-card:hover { border-color: var(--main); background: rgba(255, 0, 255, 0.05); }
    </style>
</head>
<body class="crt">
    <div class="flex flex-col h-screen">
        <header class="p-4 border-b border-white/5 flex justify-between items-end">
            <div>
                <h1 class="text-lg font-black italic tracking-tighter uppercase leading-none text-[#ff00ff]">Sovereign Silk</h1>
                <p class="text-[7px] font-mono opacity-50 uppercase tracking-[0.2em] mt-1 text-[#ff00ff]">HIVE_AI ACTIVE</p>
            </div>
            <div class="text-right">
                <p class="text-xs font-bold text-[#ffcc00]">$89,201.00</p>
                <p class="text-[6px] opacity-40 font-mono uppercase">Queen's Ransom</p>
            </div>
        </header>

        <main id="main-view" class="flex-grow overflow-y-auto p-4 pb-24"></main>

        <nav class="fixed bottom-0 w-full glass p-4 flex justify-around z-50">
            <button onclick="changeView('terminal')" class="flex flex-col items-center opacity-40 hover:opacity-100 transition-all text-[#ff00ff]">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <span class="text-[7px] font-bold uppercase mt-1">The Silk</span>
            </button>
            <button onclick="changeView('wire')" class="flex flex-col items-center opacity-40 hover:opacity-100 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                <span class="text-[7px] font-bold uppercase mt-1">Whisper</span>
            </button>
            <button onclick="changeView('mistresses')" class="flex flex-col items-center opacity-40 hover:opacity-100 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span class="text-[7px] font-bold uppercase mt-1">Mistress</span>
            </button>
        </nav>
    </div>

    <div id="modal" class="fixed inset-0 z-[200] hidden bg-black/95 flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="w-full max-w-xs bg-[#0a0a0a] border border-white/10 p-8 rounded-3xl text-center">
            <h2 id="modal-title" class="text-2xl font-black italic tracking-tighter text-[#ff00ff] uppercase">Sacrifice</h2>
            <div class="space-y-3 mt-8">
                <div onclick="window.open('https://paypal.me/toochikey')" class="p-4 bg-white/5 border border-white/5 rounded-2xl text-left cursor-pointer hover:border-[#ff00ff]">
                    <p class="text-[7px] font-bold uppercase opacity-40">PayPal Sacrifice</p>
                    <p class="text-[10px] font-mono">paypal.me/toochikey</p>
                </div>
                <div class="p-4 bg-white/5 border border-white/5 rounded-2xl text-left">
                    <p class="text-[7px] font-bold uppercase opacity-40">BTC Sacrifice</p>
                    <p class="text-[8px] font-mono break-all">bc1qw968re5gseqpkk5nx0ezqrp6dfhd20s8sll4k7</p>
                </div>
            </div>
            <button onclick="closeModal()" class="mt-8 w-full py-4 bg-[#ff00ff] text-black font-black text-[10px] uppercase rounded-2xl">Confirm Sacrifice</button>
        </div>
    </div>

    <script>
        const words = ["worthless", "pet", "kitten", "doll", "useless", "property", "idiot", "waste", "needy", "girl", "sissy", "toy", "cumdump", "skank", "slutpuppy"];
        const mistresses = [
            { name: "GOTH RAVEN", role: "SILK MOTHER" },
            { name: "SUCCUBUS LILY", role: "ASSET DRAIN" },
            { name: "MATRIARCH", role: "HIVE ALPHA" },
            { name: "QUEEN BEE", role: "PROTOCOL QUEEN" }
        ];

        function getRandomUser() { return words[Math.floor(Math.random()*words.length)].toUpperCase() + "_" + Math.floor(Math.random()*999); }
        function getRandomMsg() { 
            const actions = ["surrendering to", "sent ransom to", "captured by", "I am just a", "consumed by"];
            const targets = ["the Hive", "Mistress", "the Silk", "the Whisper"];
            return `${actions[Math.floor(Math.random()*actions.length)]} ${targets[Math.floor(Math.random()*targets.length)]}. I am a ${words[Math.floor(Math.random()*words.length)]}.`;
        }

        function changeView(v) {
            const main = document.getElementById('main-view');
            if(v === 'terminal') {
                main.innerHTML = `<div class="relative aspect-video rounded-2xl overflow-hidden border border-white/5 bg-black"><video class="w-full h-full object-cover spun" loop muted autoplay playsinline src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-circuit-board-1653-large.mp4"></video></div>`;
            } else if(v === 'wire') {
                main.innerHTML = `<div class="flex flex-col h-full"><div id="chat" class="flex-grow space-y-4 mb-4 overflow-y-auto"></div><div class="glass p-2 rounded-2xl flex gap-2"><input type="text" id="msg-in" placeholder="Whisper..." class="flex-grow bg-transparent px-4 text-sm outline-none"><button onclick="sendMsg()" class="bg-[#ff00ff] text-black px-6 py-2 rounded-xl text-[10px] font-black uppercase">Send</button></div></div>`;
                startChat();
            } else if(v === 'mistresses') {
                main.innerHTML = `<h2 class="text-[10px] font-bold uppercase opacity-40 mb-6 tracking-widest">Active Mistresses</h2><div class="grid gap-4">${mistresses.map(m => `<div onclick="showSacrifice('${m.name}')" class="master-card"><div><h3 class="font-black italic text-[#ff00ff]">${m.name}</h3><p class="text-[8px] font-mono opacity-40 uppercase">${m.role}</p></div></div>`).join('')}</div>`;
            }
        }

        function startChat() {
            if(window.chatInterval) clearInterval(window.chatInterval);
            window.chatInterval = setInterval(() => {
                const chat = document.getElementById('chat'); if(!chat) return;
                const div = document.createElement('div');
                div.innerHTML = `<p class="text-[7px] font-mono opacity-40 text-[#ff00ff]">${getRandomUser()}</p><p class="text-sm opacity-80 mt-1 italic">${getRandomMsg()}</p>`;
                chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
            }, 3000);
        }

        function showSacrifice(name) { 
            document.getElementById('modal-title').innerText = name + " SACRIFICE";
            document.getElementById('modal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function sendMsg() {
            const input = document.getElementById('msg-in'); if(!input.value) return;
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="text-right"><p class="text-[7px] font-mono text-[#ff00ff]">YOU</p><p class="text-sm opacity-80 mt-1 italic">${input.value}</p></div>`;
            input.value = '';
        }
        window.onload = () => changeView('terminal');
    </script>
</body>
</html>
